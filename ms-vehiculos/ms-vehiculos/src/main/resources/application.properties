# Configuración del servidor
server.port=8082
spring.application.name=ms-vehiculos

spring.datasource.url=jdbc:mysql://localhost:3306/sistema_arriendo?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuración adicional para Hibernate
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update

# Configuración del Cliente de Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/