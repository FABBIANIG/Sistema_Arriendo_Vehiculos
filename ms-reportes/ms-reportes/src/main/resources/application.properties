# agregado: nombre del microservicio
spring.application.name=ms-reservas

# agregado: puerto indicado en la pauta
server.port=8083

# agregado: conexion a la base de datos prueba2
spring.datasource.url=jdbc:mysql://localhost:3306/prueba2?useSSL=false&serverTimezone=America/Santiago&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=

# agregado: driver MySQL
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# agregado: configuracion JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# agregado: Flyway para crear tablas e insertar datos
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# agregado: logs
logging.level.com.duoc.ms_reservas=INFO
logging.level.org.hibernate.SQL=DEBUG