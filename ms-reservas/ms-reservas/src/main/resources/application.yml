server:
  port: 8083

spring:
  application:
    name: ms-reservas
  datasource:
    url: jdbc:mysql://localhost:3306/prueba2?useSSL=false&serverTimezone=America/Santiago&allowPublicKeyRetrieval=true
    username: root
    password: ""
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

# Si es un archivo .yml
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

logging:
  level:
    com.duoc.ms_reservas: INFO
    org.hibernate.SQL: DEBUG
