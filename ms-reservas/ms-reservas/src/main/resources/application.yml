server:
  port: 8083

spring:
  application:
    name: ms-reservas
  datasource:
    # Usa la variable de entorno DB_URL si existe, si no, se conecta a localhost
    url: ${DB_URL:jdbc:mysql://localhost:3306/db_reservas}
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:tu_clave}
  flyway:
    locations: classpath:db/migration

eureka:
  client:
    service-url:
      # Usa la variable de entorno EUREKA_URL si existe, si no, busca el Eureka local
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}