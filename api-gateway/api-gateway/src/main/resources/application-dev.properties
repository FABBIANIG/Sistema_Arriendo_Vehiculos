server.port=8080

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

spring.cloud.gateway.server.webmvc.routes[0].id=ms-clientes-clientes
spring.cloud.gateway.server.webmvc.routes[0].uri=lb://MS-CLIENTES
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/api/v1/clientes/**

spring.cloud.gateway.server.webmvc.routes[1].id=ms-clientes-direcciones
spring.cloud.gateway.server.webmvc.routes[1].uri=lb://MS-CLIENTES
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/api/v1/direcciones/**

spring.cloud.gateway.server.webmvc.routes[2].id=ms-vehiculos-vehiculos
spring.cloud.gateway.server.webmvc.routes[2].uri=lb://MS-VEHICULOS
spring.cloud.gateway.server.webmvc.routes[2].predicates[0]=Path=/api/v1/vehiculos/**

spring.cloud.gateway.server.webmvc.routes[3].id=ms-vehiculos-categorias
spring.cloud.gateway.server.webmvc.routes[3].uri=lb://MS-VEHICULOS
spring.cloud.gateway.server.webmvc.routes[3].predicates[0]=Path=/api/v1/categorias/**

spring.cloud.gateway.server.webmvc.routes[4].id=ms-reservas
spring.cloud.gateway.server.webmvc.routes[4].uri=lb://MS-RESERVAS
spring.cloud.gateway.server.webmvc.routes[4].predicates[0]=Path=/api/v1/reservas/**

management.endpoints.web.exposure.include=health,info,gateway